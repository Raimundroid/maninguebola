<!doctype html>
<html lang="pt">
  <head>
    <!--Character Encoding - Must be first in <head> -->
    <meta charset="UTF-8" />

    <!-- Responsive Design - Critical for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--Meta tags: -->

    <!--SEO -  Appears in search result snippets -->
    <meta
      name="description"
      content="Um website para promover e digitalizar o futebol local de Moçambique."
    />

    <!-- Crawling instructions for search engines-->
    <meta name="robots" content="index, follow" />

    <!--  Authorship -->
    <meta name="author" content="RAIMUNDO" />

    <!--  Prevent Google auto-translation (useful for language-specific content ) -->
    <meta name="googlebot" content="notranslate" />

    <!--  Cache Control (useful for SPAs or frequently updated pages) -->
    <meta http-equiv="Cache-Control" content="no-cache" />

    <!-- Telephone detection on mobile (useful for contact/business pages, but it could format strings of random numbers as telephone numbers, reason why = no) -->
    <meta name="format-detection" content="telephone=no" />

    <!--Open Graph Protocol - Controls how a page looks when shared on Facebook/WhatsApp -->

    <!-- 1. the name that will be displayed in the preview (must reflet the content of the individual web page, not the website as a whole) -->
    <meta property="og:title" content="Maningue Bola" />

    <!--2. informs the social media platform, that the content being shared is a website  -->
    <meta property="og:type" content="website" />

    <!-- 3. informs the social media platform what the prefered preview image is -->
    <meta property="og:image" content="/maningue-bola-logo-white-bg-v1.png" />

    <!-- 4. url of the website -->
    <meta property="og:url" content="https://maninguebola.com" />

    <!-- 5. if the social media platform displays a description of the page when it is shared, this text will be displayed to inform the users waht the web -->
    <meta
      property="og:description"
      content="Somos um website com a missão de promover e digitalizar o futebol local do distrito de Morrumbene e outros distritos e ajudar a dar destaque aos jogadores talentosos locais."
    />

    <!-- 6. informs the SM pltaform that the locale isMoçambique Portuguese  -->
    <meta property="og:locale" content="pt_MZ" />

    <!-- 7.  some SM platfroms will also display the website name beside the page title, so this will ensure that the website title is correct -->
    <meta property="og:site_name" content="Maningue Bola" />

    <!-- Canonical URL - Prevents duplicate content (SEO issues) -->
    <link rel="canonical" href="https://maninguebola.com" />

    <!-- Theme color - Colors the browser bar on Android Chrome -->
    <meta name="theme-color" content="#0000ff" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon-v2.svg" />
    <!-- <link rel="apple-touch-icon" href="%PUBLIC_URL%/LL-logo-2.ico" /> -->

    <title>Maningue Bola</title>

    <link
      rel="preload"
      href="/images/hero/football-field-upperview-0.webp"
      as="image"
      fetchpriority="high"
    />
    <!-- /* "blue-stadium-0.webp" */
  /* "blue&yellow-half-stadium-0.webp"*/
  /* "football-field-upperview-0.webp" */ -->

    <!-- Secondary Hero Image (Still critical, but slightly lower priority) -->

    <!-- <link
      rel="preload"
      href="/images/seasonalBanner/clock-tower-fireworks-0.webp"
      as="image"
      fetchpriority="auto"
    /> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
