<!doctype html>
<html lang="pt">
  <head>
    <!--Character Encoding - Must be first in <head> -->
    <meta charset="UTF-8" />

    <!-- Responsive Design - Critical for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--Meta tags: -->

    <!--SEO -  Appears in search result snippets -->
    <meta
      name="description"
      content="Um website para promover e digitalizar o futebol local de Moçambique."
    />

    <!-- Crawling instructions for search engines-->
    <meta name="robots" content="index, follow" />

    <!--  Authorship -->
    <meta name="author" content="RAIMUNDO" />

    <!--  Prevent Google auto-translation (useful for language-specific content ) -->
    <meta name="googlebot" content="notranslate" />

    <!--  Cache Control (useful for SPAs or frequently updated pages) -->
    <meta http-equiv="Cache-Control" content="no-cache" />

    <!-- Telephone detection on mobile (useful for contact/business pages) -->
    <meta name="format-detection" content="telephone=no" />

    <!--Open Graph Protocol-->
    <meta property="og:title" content="Maningue Bola" />
    <meta
      property="og:description"
      content="Somos um website com a missão de digitalizar o futebol local do distrito de Morrumbene e outros distritos e ajudar a dar destaque aos jogadores talentosos locais."
    />
    <!-- <meta property="og:image" content="http://localhost:3000/imgs/LLLogo.jpg" /> -->
    <meta property="og:url" content="https://maninguebola.com" />
    <meta property="og:type" content="website" />

    <!-- <link rel="apple-touch-icon" href="%PUBLIC_URL%/LL-logo-2.ico" /> -->

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon-v2.svg" />

    <title>Maningue Bola</title>

    <link
      rel="preload"
      href="/images/hero/blue&yellow-half-stadium-0.webp"
      as="image"
      fetchpriority="high"
    />
    <!-- /* "blue-stadium-0.webp" */
  /* "blue&yellow-half-stadium-0.webp"*/
  /* "football-field-upperview-0.webp" */ -->

    <!-- Secondary Hero Image (Still critical, but slightly lower priority) -->

    <!-- <link
      rel="preload"
      href="/images/seasonalBanner/clock-tower-fireworks-0.webp"
      as="image"
      fetchpriority="auto"
    /> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
